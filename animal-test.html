<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나는 어떤 동물상? 🐶🐱🐢</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .header p {
            margin-top: 0.5rem;
            font-size: 1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* Screen states */
        .screen { display: none; flex-direction: column; align-items: center; gap: 1.2rem; }
        .screen.active { display: flex; }

        /* Start screen */
        .animal-icons { font-size: 3.5rem; letter-spacing: 0.5rem; }

        .desc-text {
            text-align: center;
            color: #555;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:hover { box-shadow: 0 6px 20px rgba(102, 126, 234, 0.7); }

        .btn-secondary {
            background: #f0f0f5;
            color: #555;
        }

        /* Camera screen */
        .webcam-wrap {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #667eea;
            box-shadow: 0 0 0 6px rgba(102,126,234,0.2);
            background: #111;
        }

        #webcam-container canvas {
            width: 280px !important;
            height: 280px !important;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(180deg, transparent 60%, rgba(102,126,234,0.3) 100%);
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            animation: scan 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0%   { top: 0%; opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .hint-text {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
        }

        /* Result screen */
        .result-animal {
            font-size: 5rem;
            line-height: 1;
        }

        .result-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #333;
            text-align: center;
        }

        .result-subtitle {
            font-size: 1rem;
            color: #667eea;
            font-weight: 600;
            text-align: center;
        }

        .result-desc {
            text-align: center;
            color: #555;
            font-size: 0.93rem;
            line-height: 1.7;
            background: #f7f7ff;
            border-radius: 12px;
            padding: 1rem 1.2rem;
        }

        /* Score bars */
        .scores { width: 100%; display: flex; flex-direction: column; gap: 0.6rem; }

        .score-row { display: flex; align-items: center; gap: 0.6rem; }

        .score-label { width: 60px; font-size: 0.85rem; color: #555; font-weight: 600; }

        .score-bar-bg {
            flex: 1;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 1s cubic-bezier(0.4,0,0.2,1);
            width: 0%;
        }

        .score-pct { width: 38px; font-size: 0.82rem; color: #888; text-align: right; }

        /* Loading */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
        }

        .spinner {
            width: 48px; height: 48px;
            border: 5px solid #eee;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: #888; font-size: 0.9rem; }

        /* Error */
        .error-text { color: #e53935; font-size: 0.9rem; text-align: center; }

        /* Upload option */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            width: 100%;
            color: #bbb;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }

        #file-input { display: none; }

        .upload-btn {
            width: 100%;
            padding: 0.8rem;
            border: 2px dashed #ccc;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            background: none;
            color: #888;
            transition: border-color 0.2s, color 0.2s;
        }

        .upload-btn:hover { border-color: #667eea; color: #667eea; }

        /* Preview image (for upload mode) */
        .preview-img {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            box-shadow: 0 0 0 6px rgba(102,126,234,0.2);
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>나는 어떤 동물상?</h1>
        <p>AI가 당신의 동물상을 분석해드려요</p>
    </div>

    <div class="card">
        <!-- Start Screen -->
        <div class="screen active" id="screen-start">
            <div class="animal-icons">🐶🐱🐢</div>
            <p class="desc-text">
                웹캠 또는 사진으로 당신의 얼굴이<br>
                <strong>강아지상 · 고양이상 · 거북이상</strong> 중<br>
                어떤 동물을 닮았는지 알아보세요!
            </p>
            <button class="btn btn-primary" onclick="startCamera()">📷 카메라로 테스트하기</button>
            <div class="divider">또는</div>
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">🖼️ 사진 업로드하기</button>
            <input type="file" id="file-input" accept="image/*" onchange="handleUpload(event)">
            <p id="start-error" class="error-text"></p>
        </div>

        <!-- Loading Screen -->
        <div class="screen" id="screen-loading">
            <div class="loading-wrap">
                <div class="spinner"></div>
                <p class="loading-text" id="loading-msg">AI 모델을 불러오는 중...</p>
            </div>
        </div>

        <!-- Camera Screen -->
        <div class="screen" id="screen-camera">
            <div class="webcam-wrap">
                <div id="webcam-container"></div>
                <div class="scan-overlay"></div>
                <div class="scan-line"></div>
            </div>
            <p class="hint-text">얼굴을 카메라 중앙에 위치시켜 주세요</p>
            <button class="btn btn-primary" onclick="captureAndPredict()">✨ 분석하기</button>
            <button class="btn btn-secondary" onclick="stopCamera()">← 돌아가기</button>
        </div>

        <!-- Upload Preview Screen -->
        <div class="screen" id="screen-upload">
            <img id="preview-img" class="preview-img" alt="업로드된 사진">
            <button class="btn btn-primary" onclick="analyzeUpload()">✨ 분석하기</button>
            <button class="btn btn-secondary" onclick="resetToStart()">← 다시 선택</button>
        </div>

        <!-- Result Screen -->
        <div class="screen" id="screen-result">
            <div class="result-animal" id="result-emoji"></div>
            <div class="result-title" id="result-title"></div>
            <div class="result-subtitle" id="result-subtitle"></div>
            <div class="result-desc" id="result-desc"></div>
            <div class="scores" id="score-bars"></div>
            <button class="btn btn-primary" onclick="retake()">🔄 다시 테스트하기</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/B8cBJyLMv/";

const ANIMAL_DATA = {
    "강아지": {
        emoji: "🐶",
        label: "강아지상",
        color: "#f4a261",
        desc: "충성스럽고 따뜻한 눈빛을 가진 당신! 친근하고 사교적인 매력으로 주변 사람들에게 사랑받는 타입이에요. 한번 마음을 주면 끝까지 함께하는 의리파랍니다. 🐾"
    },
    "고양이": {
        emoji: "🐱",
        label: "고양이상",
        color: "#a8dadc",
        desc: "신비롭고 도도한 눈빛을 가진 당신! 독립적이고 세련된 매력으로 상대방을 설레게 하는 타입이에요. 차가워 보여도 속은 따뜻한 츤데레 스타일! 🐾"
    },
    "거북이": {
        emoji: "🐢",
        label: "거북이상",
        color: "#52b788",
        desc: "묵직하고 신뢰감 넘치는 당신! 느긋해 보여도 중요한 순간에는 누구보다 강한 의지를 발휘하는 타입이에요. 오래 사귈수록 그 매력이 빛나는 대기만성형! 🍀"
    }
};

let model = null;
let webcam = null;
let uploadedImageEl = null;

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function loadModel() {
    if (model) return;
    showScreen('screen-loading');
    document.getElementById('loading-msg').textContent = 'AI 모델을 불러오는 중...';
    model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
}

async function startCamera() {
    document.getElementById('start-error').textContent = '';
    try {
        await loadModel();
        document.getElementById('loading-msg').textContent = '카메라를 준비하는 중...';

        const flip = true;
        webcam = new tmImage.Webcam(280, 280, flip);
        await webcam.setup();
        await webcam.play();

        const container = document.getElementById('webcam-container');
        container.innerHTML = '';
        container.appendChild(webcam.canvas);

        showScreen('screen-camera');
        requestAnimationFrame(updateWebcam);
    } catch (e) {
        model = null;
        showScreen('screen-start');
        document.getElementById('start-error').textContent = '카메라를 사용할 수 없습니다. 사진 업로드를 이용해주세요.';
    }
}

function updateWebcam() {
    if (webcam && document.getElementById('screen-camera').classList.contains('active')) {
        webcam.update();
        requestAnimationFrame(updateWebcam);
    }
}

function stopCamera() {
    if (webcam) { webcam.stop(); webcam = null; }
    showScreen('screen-start');
}

async function captureAndPredict() {
    if (!webcam) return;
    const predictions = await model.predict(webcam.canvas);
    webcam.stop();
    webcam = null;
    showResult(predictions);
}

function handleUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = document.getElementById('preview-img');
        img.src = e.target.result;
        img.style.display = 'block';
        uploadedImageEl = img;
        showScreen('screen-upload');
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}

async function analyzeUpload() {
    if (!uploadedImageEl) return;
    showScreen('screen-loading');
    document.getElementById('loading-msg').textContent = 'AI 모델을 불러오는 중...';
    try {
        await loadModel();
        document.getElementById('loading-msg').textContent = '분석 중...';
        // Draw image to canvas for prediction
        const canvas = document.createElement('canvas');
        canvas.width = 224; canvas.height = 224;
        const ctx = canvas.getContext('2d');

        await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, 224, 224);
                resolve();
            };
            img.onerror = reject;
            img.src = uploadedImageEl.src;
        });

        const predictions = await model.predict(canvas);
        showResult(predictions);
    } catch (e) {
        showScreen('screen-start');
        document.getElementById('start-error').textContent = '분석 중 오류가 발생했습니다. 다시 시도해주세요.';
    }
}

function showResult(predictions) {
    // Find top prediction
    let top = predictions.reduce((a, b) => a.probability > b.probability ? a : b);

    const animal = ANIMAL_DATA[top.className];
    document.getElementById('result-emoji').textContent = animal ? animal.emoji : '🐾';
    document.getElementById('result-title').textContent = animal ? animal.label : top.className;
    document.getElementById('result-subtitle').textContent = `유사도 ${(top.probability * 100).toFixed(1)}%`;
    document.getElementById('result-desc').textContent = animal ? animal.desc : '';

    // Score bars
    const barsEl = document.getElementById('score-bars');
    barsEl.innerHTML = '';
    predictions.forEach(p => {
        const d = ANIMAL_DATA[p.className];
        const row = document.createElement('div');
        row.className = 'score-row';
        row.innerHTML = `
            <span class="score-label">${d ? d.emoji + ' ' + p.className : p.className}</span>
            <div class="score-bar-bg">
                <div class="score-bar-fill" style="background: linear-gradient(90deg, ${d ? d.color : '#667eea'}, ${d ? d.color + 'aa' : '#764ba2'})"></div>
            </div>
            <span class="score-pct">${(p.probability * 100).toFixed(1)}%</span>
        `;
        barsEl.appendChild(row);
    });

    showScreen('screen-result');

    // Animate bars after render
    requestAnimationFrame(() => {
        predictions.forEach((p, i) => {
            const bar = barsEl.children[i]?.querySelector('.score-bar-fill');
            if (bar) bar.style.width = (p.probability * 100) + '%';
        });
    });
}

function retake() {
    uploadedImageEl = null;
    document.getElementById('preview-img').style.display = 'none';
    showScreen('screen-start');
}

function resetToStart() {
    uploadedImageEl = null;
    document.getElementById('preview-img').style.display = 'none';
    showScreen('screen-start');
}
</script>
</body>
</html>
