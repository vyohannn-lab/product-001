<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나는 어떤 동물상? 🐶🐱🐢</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem 4rem;
        }

        .container {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .header { text-align: center; color: white; }
        .header h1 { font-size: 2rem; font-weight: 800; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .header p  { margin-top: 0.4rem; font-size: 0.95rem; opacity: 0.85; }

        .card {
            background: white;
            border-radius: 24px;
            padding: 2rem 1.8rem;
            width: 100%;
            box-shadow: 0 12px 48px rgba(0,0,0,0.22);
        }

        .screen { display: none; flex-direction: column; align-items: center; gap: 1.3rem; }
        .screen.active { display: flex; }

        /* ── Start screen ── */
        .animal-icons { font-size: 3.5rem; letter-spacing: 0.4rem; }

        .desc-text {
            text-align: center;
            color: #555;
            font-size: 0.93rem;
            line-height: 1.7;
        }

        /* Drop zone */
        .drop-zone {
            width: 100%;
            border: 2.5px dashed #c5b8f5;
            border-radius: 16px;
            padding: 2.2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #faf9ff;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: #667eea;
            background: #f0edff;
        }

        .drop-zone-icon { font-size: 2.8rem; }
        .drop-zone-title { font-size: 1rem; font-weight: 700; color: #444; }
        .drop-zone-sub   { font-size: 0.82rem; color: #999; }

        #file-input { display: none; }

        .error-text { color: #e53935; font-size: 0.88rem; text-align: center; min-height: 1em; }

        /* ── Preview screen ── */
        .preview-wrap {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #667eea;
            box-shadow: 0 0 0 6px rgba(102,126,234,0.18);
            background: #eee;
            flex-shrink: 0;
        }

        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── Loading screen ── */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 0;
        }

        .spinner {
            width: 52px; height: 52px;
            border: 5px solid #eee;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #888; font-size: 0.9rem; }

        /* ── Result screen ── */
        .result-emoji  { font-size: 5.5rem; line-height: 1; }
        .result-title  { font-size: 1.9rem; font-weight: 800; color: #222; }
        .result-pct    { font-size: 1rem; font-weight: 600; color: #667eea; }

        .result-desc {
            text-align: center;
            color: #555;
            font-size: 0.92rem;
            line-height: 1.75;
            background: #f7f6ff;
            border-radius: 14px;
            padding: 1rem 1.1rem;
            width: 100%;
        }

        .scores { width: 100%; display: flex; flex-direction: column; gap: 0.65rem; }

        .score-row { display: flex; align-items: center; gap: 0.7rem; }
        .score-label { width: 68px; font-size: 0.84rem; color: #555; font-weight: 600; }
        .score-bar-bg { flex: 1; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
        .score-bar-fill {
            height: 100%;
            border-radius: 6px;
            width: 0%;
            transition: width 1s cubic-bezier(0.4,0,0.2,1);
        }
        .score-pct { width: 40px; font-size: 0.82rem; color: #999; text-align: right; }

        /* ── Buttons ── */
        .btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
        }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 14px rgba(102,126,234,0.45);
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(102,126,234,0.65); }

        .btn-secondary { background: #f0f0f6; color: #666; }
        .btn-secondary:hover { background: #e6e4f5; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>나는 어떤 동물상? 🐾</h1>
        <p>사진 한 장으로 AI가 당신의 동물상을 분석해드려요</p>
    </div>

    <div class="card">

        <!-- Start -->
        <div class="screen active" id="screen-start">
            <div class="animal-icons">🐶🐱🐢</div>
            <p class="desc-text">
                사진을 올리면 AI가<br>
                <strong>강아지상 · 고양이상 · 거북이상</strong> 중<br>
                어떤 동물을 닮았는지 알려드릴게요!
            </p>

            <div class="drop-zone" id="drop-zone"
                 onclick="document.getElementById('file-input').click()"
                 ondragover="onDragOver(event)"
                 ondragleave="onDragLeave(event)"
                 ondrop="onDrop(event)">
                <div class="drop-zone-icon">🖼️</div>
                <div class="drop-zone-title">사진을 클릭하거나 끌어다 놓으세요</div>
                <div class="drop-zone-sub">JPG · PNG · WEBP 등 이미지 파일</div>
            </div>
            <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">

            <p class="error-text" id="start-error"></p>
        </div>

        <!-- Preview -->
        <div class="screen" id="screen-preview">
            <div class="preview-wrap">
                <img id="preview-img" alt="선택한 사진">
            </div>
            <button class="btn btn-primary" onclick="analyze()">✨ 분석하기</button>
            <button class="btn btn-secondary" onclick="resetToStart()">← 다른 사진 선택</button>
        </div>

        <!-- Loading -->
        <div class="screen" id="screen-loading">
            <div class="loading-wrap">
                <div class="spinner"></div>
                <p class="loading-text" id="loading-msg">AI 모델을 불러오는 중...</p>
            </div>
        </div>

        <!-- Result -->
        <div class="screen" id="screen-result">
            <div class="result-emoji" id="result-emoji"></div>
            <div class="result-title"  id="result-title"></div>
            <div class="result-pct"    id="result-pct"></div>
            <div class="result-desc"   id="result-desc"></div>
            <div class="scores"        id="score-bars"></div>
            <button class="btn btn-primary" onclick="resetToStart()">🔄 다시 테스트하기</button>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/B8cBJyLMv/";

const ANIMALS = {
    "강아지": { emoji: "🐶", label: "강아지상", color: "#f4a261",
        desc: "충성스럽고 따뜻한 눈빛을 가진 당신! 친근하고 사교적인 매력으로 주변에서 사랑받는 타입이에요. 한 번 마음을 주면 끝까지 함께하는 의리파랍니다. 🐾" },
    "고양이": { emoji: "🐱", label: "고양이상", color: "#7b9cda",
        desc: "신비롭고 도도한 눈빛을 가진 당신! 독립적이고 세련된 매력으로 상대방을 설레게 하는 타입이에요. 차가워 보여도 속은 따뜻한 츤데레 스타일! ✨" },
    "거북이": { emoji: "🐢", label: "거북이상", color: "#52b788",
        desc: "묵직하고 신뢰감 넘치는 당신! 느긋해 보여도 중요한 순간에 누구보다 강한 의지를 발휘하는 타입이에요. 오래 사귈수록 그 매력이 빛나는 대기만성형! 🍀" }
};

let model = null;
let pendingImageSrc = null;

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ── Drag & Drop ── */
function onDragOver(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.add('dragover');
}
function onDragLeave(e) {
    document.getElementById('drop-zone').classList.remove('dragover');
}
function onDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadPreview(file);
}

/* ── File input ── */
function handleFile(e) {
    const file = e.target.files[0];
    if (file) loadPreview(file);
    e.target.value = '';
}

function loadPreview(file) {
    document.getElementById('start-error').textContent = '';
    const reader = new FileReader();
    reader.onload = (e) => {
        pendingImageSrc = e.target.result;
        document.getElementById('preview-img').src = pendingImageSrc;
        showScreen('screen-preview');
    };
    reader.readAsDataURL(file);
}

/* ── Analyze ── */
async function analyze() {
    if (!pendingImageSrc) return;
    showScreen('screen-loading');
    document.getElementById('loading-msg').textContent = 'AI 모델을 불러오는 중...';

    try {
        if (!model) {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        }
        document.getElementById('loading-msg').textContent = '분석 중...';

        const canvas = document.createElement('canvas');
        canvas.width = 224; canvas.height = 224;
        const ctx = canvas.getContext('2d');

        await new Promise((res, rej) => {
            const img = new Image();
            img.onload = () => { ctx.drawImage(img, 0, 0, 224, 224); res(); };
            img.onerror = rej;
            img.src = pendingImageSrc;
        });

        const preds = await model.predict(canvas);
        showResult(preds);
    } catch (err) {
        model = null;
        showScreen('screen-start');
        document.getElementById('start-error').textContent = '분석 중 오류가 발생했습니다. 다시 시도해주세요.';
    }
}

/* ── Show result ── */
function showResult(preds) {
    const top = preds.reduce((a, b) => a.probability > b.probability ? a : b);
    const a = ANIMALS[top.className] || { emoji: '🐾', label: top.className, color: '#667eea', desc: '' };

    document.getElementById('result-emoji').textContent = a.emoji;
    document.getElementById('result-title').textContent = a.label;
    document.getElementById('result-pct').textContent   = `유사도 ${(top.probability * 100).toFixed(1)}%`;
    document.getElementById('result-desc').textContent  = a.desc;

    const barsEl = document.getElementById('score-bars');
    barsEl.innerHTML = '';
    preds.forEach(p => {
        const d = ANIMALS[p.className];
        const row = document.createElement('div');
        row.className = 'score-row';
        row.innerHTML = `
            <span class="score-label">${d ? d.emoji + ' ' + p.className : p.className}</span>
            <div class="score-bar-bg">
                <div class="score-bar-fill" data-pct="${p.probability}"
                     style="background: linear-gradient(90deg, ${d ? d.color : '#667eea'}, ${d ? d.color + 'bb' : '#764ba2'})"></div>
            </div>
            <span class="score-pct">${(p.probability * 100).toFixed(1)}%</span>`;
        barsEl.appendChild(row);
    });

    showScreen('screen-result');

    requestAnimationFrame(() => requestAnimationFrame(() => {
        barsEl.querySelectorAll('.score-bar-fill').forEach(el => {
            el.style.width = (parseFloat(el.dataset.pct) * 100) + '%';
        });
    }));
}

/* ── Reset ── */
function resetToStart() {
    pendingImageSrc = null;
    document.getElementById('preview-img').src = '';
    showScreen('screen-start');
}
</script>
</body>
</html>
