document.addEventListener('langchange', (e) => {
    document.getElementById('info-section').innerHTML = INFO[e.detail.lang];
});

Lang.init();

let model = null;
let pendingImageSrc = null;

function t(key, ...args) {
    const val = window.TRANSLATIONS[Lang.get()][key];
    return typeof val === 'function' ? val(...args) : val;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function onDragOver(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.add('dragover');
}
function onDragLeave(e) {
    document.getElementById('drop-zone').classList.remove('dragover');
}
function onDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadPreview(file);
}

function handleFile(e) {
    const file = e.target.files[0];
    if (file) loadPreview(file);
    e.target.value = '';
}

function loadPreview(file) {
    document.getElementById('start-error').textContent = '';
    const reader = new FileReader();
    reader.onload = (e) => {
        pendingImageSrc = e.target.result;
        document.getElementById('preview-img').src = pendingImageSrc;
        showScreen('screen-preview');
    };
    reader.readAsDataURL(file);
}

async function analyze() {
    if (!pendingImageSrc) return;
    showScreen('screen-loading');
    document.getElementById('loading-msg').textContent = t('loading-model');

    try {
        if (!model) {
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        }
        document.getElementById('loading-msg').textContent = t('loading-analyze');

        const canvas = document.createElement('canvas');
        canvas.width = 224; canvas.height = 224;
        const ctx = canvas.getContext('2d');

        await new Promise((res, rej) => {
            const img = new Image();
            img.onload = () => { ctx.drawImage(img, 0, 0, 224, 224); res(); };
            img.onerror = rej;
            img.src = pendingImageSrc;
        });

        const preds = await model.predict(canvas);
        showResult(preds);
    } catch (err) {
        model = null;
        showScreen('screen-start');
        document.getElementById('start-error').textContent = t('error-analyze');
    }
}

function showResult(preds) {
    const lang = Lang.get();
    const top = preds.reduce((a, b) => a.probability > b.probability ? a : b);
    const a = ANIMALS[top.className];
    const data = a ? a[lang] : { label: top.className, name: top.className, desc: '' };

    document.getElementById('result-emoji').textContent = a ? a.emoji : '🐾';
    document.getElementById('result-title').textContent = data.label;
    document.getElementById('result-pct').textContent   = t('result-pct', (top.probability * 100).toFixed(1));
    document.getElementById('result-desc').textContent  = data.desc;

    const barsEl = document.getElementById('score-bars');
    barsEl.innerHTML = '';
    preds.forEach(p => {
        const d = ANIMALS[p.className];
        const row = document.createElement('div');
        row.className = 'score-row';
        row.innerHTML = `
            <span class="score-label">${d ? d[lang].name : p.className}</span>
            <div class="score-bar-bg">
                <div class="score-bar-fill" data-pct="${p.probability}"
                     style="background: linear-gradient(90deg, ${d ? d.color : '#667eea'}, ${d ? d.color + 'bb' : '#764ba2'})"></div>
            </div>
            <span class="score-pct">${(p.probability * 100).toFixed(1)}%</span>`;
        barsEl.appendChild(row);
    });

    showScreen('screen-result');

    requestAnimationFrame(() => requestAnimationFrame(() => {
        barsEl.querySelectorAll('.score-bar-fill').forEach(el => {
            el.style.width = (parseFloat(el.dataset.pct) * 100) + '%';
        });
    }));
}

function resetToStart() {
    pendingImageSrc = null;
    document.getElementById('preview-img').src = '';
    showScreen('screen-start');
}
</script>
