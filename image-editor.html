        .btn-new { background: #2d2d2d; color: #a0a0a0; }
        .btn-new:hover { background: #3a3a3a; color: #c8c8c8; }

        .btn-export {
            background: linear-gradient(135deg, #667eea, #764ba2);

        }
        .btn-export:hover { opacity: 0.88; }

        /* ── Main layout ─────────────────────────────── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* ── Sidebar / Toolbar ───────────────────────── */
        .sidebar {
            width: 68px;
            background: #222;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;

        .sidebar-divider {
            width: 36px;
            height: 1px;
            background: #333;
            margin: 0.3rem 0;

        .tool-btn {
            width: 50px;
            height: 46px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            background: transparent;
            border: 1.5px solid transparent;

                width: 56px;
                height: 4px;

            .stroke-wrap { flex-direction: row; gap: 6px; }
            .stroke-preview { display: none; }

            .canvas-area {

                padding-bottom: 80px;
            }

            .hint-strip { display: none; }
        }
    </style>

<script>
/* ─── State ──────────────────────────────────────────────── */
const canvas   = document.getElementById('main-canvas');
const ctx      = canvas.getContext('2d');
const area     = document.getElementById('canvas-area');
const hint     = document.getElementById('upload-hint');
const undoBtn  = document.getElementById('undo-btn');
const expBtn   = document.getElementById('export-btn');
const strokeDot = document.getElementById('stroke-dot');

let bgImage    = null;   // HTMLImageElement
let ops        = [];     // completed operations
let isDrawing  = false;
let startX = 0, startY = 0;
let livePath   = [];     // for pen live preview
let tool       = 'pen';
let color      = '#ef4444';
let strokeW    = 3;
let hasCanvas  = false;
let textEl     = null;   // floating <input>

/* ─── Canvas init ────────────────────────────────────────── */
function setCanvasSize(w, h) {
    canvas.width  = w;
    canvas.height = h;
    hasCanvas = true;
    hint.style.display = 'none';
    expBtn.disabled = false;
    redraw();
}

function loadImage(src) {
    const img = new Image();
    img.onload = () => {
        bgImage = img;
        const maxW = area.clientWidth  - 32;
        const maxH = area.clientHeight - 32;
        const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
        ops = [];
        setCanvasSize(Math.round(img.width * ratio), Math.round(img.height * ratio));
        syncUndoBtn();
    };
    img.src = src;
}

function newBlankCanvas() {
    const w = Math.min(area.clientWidth  - 32, 900);
    const h = Math.min(area.clientHeight - 32, 680);
    bgImage = null;
    ops = [];
    setCanvasSize(w, h);
    syncUndoBtn();
}

/* ─── Redraw ─────────────────────────────────────────────── */
function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (bgImage) {
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    ops.forEach(drawOp);
}

function drawOp(op) {
    ctx.save();
    ctx.strokeStyle = op.color;
    ctx.fillStyle   = op.color;
    ctx.lineWidth   = op.w;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    switch (op.type) {
        case 'pen':
            if (op.path.length === 1) {
                ctx.beginPath();
                ctx.arc(op.path[0].x, op.path[0].y, op.w / 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.beginPath();
                op.path.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
            }
            break;

        case 'rect':
            ctx.strokeRect(op.x, op.y, op.dw, op.dh);
            break;

        case 'arrow':
            drawArrow(ctx, op.x1, op.y1, op.x2, op.y2, op.color, op.w);
            break;

        case 'text':
            drawNote(ctx, op.x, op.y, op.text, op.color);
            break;
    }
    ctx.restore();
}

function drawArrow(ctx, x1, y1, x2, y2, col, w) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 2) return;
    const head = Math.max(14, w * 4);
    const angle = Math.atan2(dy, dx);

    ctx.save();
    ctx.strokeStyle = col;
    ctx.fillStyle   = col;
    ctx.lineWidth   = w;
    ctx.lineCap     = 'round';

    /* shaft — stop before arrowhead to avoid overlap */
    const shaftEnd = head * 0.55;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2 - shaftEnd * Math.cos(angle), y2 - shaftEnd * Math.sin(angle));
    ctx.stroke();

    /* arrowhead */
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - head * Math.cos(angle - Math.PI / 6), y2 - head * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(x2 - head * Math.cos(angle + Math.PI / 6), y2 - head * Math.sin(angle + Math.PI / 6));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function drawNote(ctx, x, y, text, col) {
    const PAD = 9, FS = 13, LH = FS + 4, R = 7;
    ctx.save();
    ctx.font = `bold ${FS}px 'Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
    const tw  = ctx.measureText(text).width;
    const nw  = tw + PAD * 2;
    const nh  = LH + PAD * 2;

    /* shadow */
    ctx.shadowColor   = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur    = 8;
    ctx.shadowOffsetY = 3;

    /* background chip */
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x + R, y);
    ctx.lineTo(x + nw - R, y);
    ctx.quadraticCurveTo(x + nw, y,      x + nw, y + R);
    ctx.lineTo(x + nw, y + nh - R);
    ctx.quadraticCurveTo(x + nw, y + nh, x + nw - R, y + nh);
    ctx.lineTo(x + R, y + nh);
    ctx.quadraticCurveTo(x, y + nh,      x, y + nh - R);
    ctx.lineTo(x, y + R);
    ctx.quadraticCurveTo(x, y,           x + R, y);
    ctx.closePath();
    ctx.fill();

    ctx.shadowColor = 'transparent';
    ctx.fillStyle   = '#fff';
    ctx.fillText(text, x + PAD, y + PAD + FS);
    ctx.restore();
}

/* live preview while dragging */
function previewDraw(x2, y2) {
    redraw();
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle   = color;
    ctx.lineWidth   = strokeW;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    if (tool === 'pen' && livePath.length > 0) {
        ctx.beginPath();
        livePath.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.lineTo(x2, y2);
        ctx.stroke();
    } else if (tool === 'rect') {
        ctx.strokeRect(startX, startY, x2 - startX, y2 - startY);
    } else if (tool === 'arrow') {
        drawArrow(ctx, startX, startY, x2, y2, color, strokeW);
    }
    ctx.restore();
}

/* ─── Pointer helpers ────────────────────────────────────── */
function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - r.left) * (canvas.width  / r.width),
        y: (e.clientY - r.top)  * (canvas.height / r.height)
    };
}

/* ─── Pointer events ─────────────────────────────────────── */
function onPointerDown(e) {
    if (!hasCanvas) return;
    if (tool === 'text') { showTextInput(e); return; }
    isDrawing = true;
    canvas.setPointerCapture(e.pointerId);
    const p = canvasPos(e);
    startX = p.x; startY = p.y;
    livePath = [p];
}

function onPointerMove(e) {
    if (!isDrawing) return;
    const p = canvasPos(e);
    livePath.push(p);
    previewDraw(p.x, p.y);
}

function onPointerUp(e) {
    if (!isDrawing) return;
    isDrawing = false;
    const p = canvasPos(e);

    if (tool === 'pen') {
        livePath.push(p);
        ops.push({ type:'pen', path:[...livePath], color, w:strokeW });
    } else if (tool === 'rect') {
        const dw = p.x - startX, dh = p.y - startY;
        if (Math.abs(dw) > 2 || Math.abs(dh) > 2)
            ops.push({ type:'rect', x:startX, y:startY, dw, dh, color, w:strokeW });
    } else if (tool === 'arrow') {
        const dx = p.x - startX, dy = p.y - startY;
        if (Math.sqrt(dx*dx + dy*dy) > 5)
            ops.push({ type:'arrow', x1:startX, y1:startY, x2:p.x, y2:p.y, color, w:strokeW });
    }
    redraw();
    syncUndoBtn();
}

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerup',   onPointerUp);
canvas.addEventListener('pointerleave', e => { if(isDrawing) onPointerUp(e); });

/* ─── Text / Note overlay ────────────────────────────────── */
function showTextInput(e) {
    if (textEl) commitText();
    const p = canvasPos(e);
    const r = canvas.getBoundingClientRect();
    const sx = r.width  / canvas.width;
    const sy = r.height / canvas.height;

    textEl = document.createElement('input');
    textEl.type = 'text';
    textEl.className = 'text-overlay';
    textEl.placeholder = '메모 입력 후 Enter';
    textEl.style.left = (r.left + p.x * sx) + 'px';
    textEl.style.top  = (r.top  + p.y * sy - 18) + 'px';
    textEl.style.borderColor = color;
    textEl._cx = p.x;
    textEl._cy = p.y - 18;

    document.body.appendChild(textEl);

    textEl.addEventListener('keydown', ev => {
        if (ev.key === 'Enter')  { ev.stopPropagation(); commitText(); }
        if (ev.key === 'Escape') { ev.stopPropagation(); cancelText(); }
    });
    textEl.addEventListener('blur', () => commitText());

    setTimeout(() => textEl && textEl.focus(), 30);
}

function commitText() {
    if (!textEl) return;
    const txt = textEl.value.trim();
    if (txt) {
        ops.push({ type:'text', x:textEl._cx, y:textEl._cy, text:txt, color, w:strokeW });
        redraw();
        syncUndoBtn();
    }
    textEl.remove();
    textEl = null;
}

function cancelText() {
    if (!textEl) return;
    textEl.remove();
    textEl = null;
}

/* ─── Tool / color / stroke ──────────────────────────────── */
function setTool(t) {
    tool = t;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
    canvas.className = t === 'text' ? 'cur-text' : '';
}

function pickDot(el) {
    color = el.dataset.color;
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('sel'));
    el.classList.add('sel');
    document.getElementById('color-picker').value = color;
}

function pickCustom(val) {
    color = val;
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('sel'));
}

function onStrokeChange(v) {
    strokeW = parseInt(v);
    const s = Math.max(4, Math.min(strokeW * 2.5, 22));
    strokeDot.style.width  = s + 'px';
    strokeDot.style.height = s + 'px';
}
onStrokeChange(3);

/* ─── Undo / Clear ───────────────────────────────────────── */
function undo() {
    if (ops.length === 0) return;
    ops.pop();
    redraw();
    syncUndoBtn();
}

function clearAll() {
    if (!hasCanvas) return;
    if (!confirm('모든 그림을 지우시겠습니까?')) return;
    ops = [];
    redraw();
    syncUndoBtn();
}

function syncUndoBtn() {
    undoBtn.disabled = ops.length === 0;
}

/* ─── Export ─────────────────────────────────────────────── */
function exportImage() {
    if (!hasCanvas) return;
    if (textEl) commitText();
    const a = document.createElement('a');
    a.download = 'annotated.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
}

/* ─── File input / drop ──────────────────────────────────── */
function onFileInput(e) {
    const file = e.target.files[0];
    if (file) readFile(file);
    e.target.value = '';
}

function onDrop(e) {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) readFile(file);
}

function readFile(file) {
    const reader = new FileReader();
    reader.onload = ev => loadImage(ev.target.result);
    reader.readAsDataURL(file);
}

/* ─── Keyboard shortcuts ─────────────────────────────────── */
document.addEventListener('keydown', e => {
    if (textEl) return; /* ignore while text input is open */
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); return; }
    if (e.key === 'Delete' || e.key === 'Backspace') { if (!e.ctrlKey && !e.metaKey) clearAll(); return; }
    const map = { p:'pen', r:'rect', a:'arrow', t:'text' };
    if (map[e.key.toLowerCase()]) setTool(map[e.key.toLowerCase()]);
});
</script>
