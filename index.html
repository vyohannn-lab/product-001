<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <lotto-generator></lotto-generator>

        <a href="animal-test.html" class="animal-banner">
            <div class="animal-banner-icons">🐶🐱🐢</div>
            <div class="animal-banner-text">
                <strong>나는 어떤 동물상?</strong>
                <span>AI가 당신의 동물상을 분석해드려요</span>
            </div>
            <div class="animal-banner-arrow">→</div>
        </a>

        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form id="contact-form" action="https://formspree.io/f/mvzdazzj" method="POST">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="company">회사명</label>
                    <input type="text" id="company" name="company" placeholder="(주)회사명">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="문의 내용을 입력해주세요." required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
                <p class="form-status" id="form-status"></p>
            </form>
        </section>
    </div>

    <section class="disqus-section">
        <div id="disqus_thread"></div>
        <script>
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://product-001.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>

    <script src="main.js"></script>
    <script>
        const form = document.getElementById('contact-form');
        const status = document.getElementById('form-status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = '전송 중...';

            const res = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                status.textContent = '문의가 접수되었습니다. 감사합니다!';
                status.className = 'form-status success';
                form.reset();
            } else {
                status.textContent = '전송에 실패했습니다. 다시 시도해주세요.';
                status.className = 'form-status error';
            }

            btn.disabled = false;
            btn.textContent = '문의 보내기';
        });
    </script>
</body>
</html>
